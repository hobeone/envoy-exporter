services:
  envoy-exporter:
    build: .
    image: envoy-exporter:latest
    container_name: envoy-exporter
    restart: unless-stopped
    volumes:
      - ./envoy.yaml:/etc/envoy-exporter/envoy.yaml:ro
    ports:
      - "6666:6666"
    # Example environment variables if needed
    # environment:
    #   - TZ=UTC
    networks:
      - nginx_proxy_network

networks:
  nginx_proxy_network:
    external: true
